<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Untitled - Notepad</title>
  <script src="mqtt.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      overflow: hidden;
      height: 100%;
    }

    body {
      font-family: Consolas, Menlo, "Courier New", monospace;
      background-color: #1f1f1f;
      color: #f3f3f3;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: fixed; /* Pins body to prevent browser panning/bouncing when keyboard is open */
      width: 100%;
      top: 0;
      left: 0;
    }

    .menu-bar {
      background-color: #2c2c2c;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      padding: 2px 8px;
      font-size: 12px;
      gap: 12px;
      user-select: none;
      flex-shrink: 0;
      color: #e3e3e3;
    }

    .menu-item {
      cursor: default;
      padding: 2px 4px;
    }

    .menu-item:active {
      background-color: #3d3d3d;
    }

    .text-canvas {
      flex: 1;
      min-height: 0;
      padding: 4px 8px;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 0;
      background-color: #1f1f1f;
    }

    .text-line {
      line-height: 1.2;
      font-size: 16px;
      color: #f3f3f3;
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .text-line.sys {
      color: #858585;
    }

    .input-area {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      background-color: #1f1f1f;
      flex-shrink: 0;
      border-top: 1px solid #2d2d2d; /* Subtle separator line */
    }

    .prompt-symbol {
      display: none; /* Hidden in A mode, visible in B mode */
      font-size: 16px;
      color: #858585;
      margin-right: 6px;
      user-select: none;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      border: 1px solid #444444; /* Clear 1px dark border in A mode */
      border-radius: 2px;
      outline: none;
      font-family: inherit;
      font-size: 16px;
      background-color: #2d2d2d;
      color: #ffffff;
      padding: 6px 10px; /* Generous padding for easy mobile clicking and visibility */
      margin: 0;
      min-height: 28px;
      -webkit-appearance: none; /* Prevents iOS default styling overrides */
      appearance: none;
    }

    .chat-input:focus {
      border-color: #0078d7; /* Soft blue focus indicator */
    }

    .btn-send {
      font-family: inherit;
      font-size: 14px;
      background-color: #2d2d2d;
      border: 1px solid #444444;
      border-radius: 2px;
      padding: 6px 12px;
      margin-left: 8px;
      cursor: pointer;
      color: #ffffff;
      min-height: 28px;
      user-select: none;
      flex-shrink: 0;
    }

    .btn-send:active {
      background-color: #3d3d3d;
      border-color: #555555;
    }

    .status-bar {
      background-color: #2c2c2c;
      border-top: 1px solid #3c3c3c;
      display: flex;
      justify-content: space-between;
      padding: 2px 8px;
      font-size: 11px;
      color: #aaaaaa;
      user-select: none;
      flex-shrink: 0;
      gap: 8px;
    }

    .status-left {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-right {
      white-space: nowrap;
      flex-shrink: 0;
    }

    .mode-toggle {
      cursor: pointer;
      padding: 0 2px;
    }

    .mode-toggle.active {
      font-weight: bold;
      text-decoration: underline;
    }

    body.mode-b .text-canvas {
      color: #d0d0d0;
      padding: 8px 10px;
    }

    body.mode-b .input-area {
      padding: 8px 10px !important;
      border-top: none !important;
      border: 1px solid #262626 !important; /* Heavily muted boxed prompt (~95%) */
      border-radius: 6px;
      margin: 0 10px 10px 10px;
    }

    body.mode-b .prompt-symbol {
      display: inline !important;
      color: #262626 !important; /* 95% muted prompt arrow */
      font-weight: bold;
    }

    body.mode-b .chat-input {
      border: none !important;
      background-color: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
      min-height: 20px !important;
      font-size: 13px !important;
      color: #262626 !important; /* 95% muted input text */
      caret-color: #262626 !important; /* 95% muted caret */
    }

    body.mode-b .text-line {
      font-size: 13px !important;
      line-height: 1.5 !important;
      color: #d0d0d0 !important; /* Agent output text */
      cursor: pointer;
    }

    body.mode-b .text-line.revealed-original {
      color: #000000 !important; /* Readable but subdued when showing real text */
    }

    body.mode-b .agent-bullet {
      color: #4ec9b0; /* Claude Code action-bullet accent */
    }

    body.mode-b .text-line.fake-op {
      color: #6a737d !important;
      cursor: default;
    }

    body.mode-b .fake-op {
      color: #e6e6e6 !important;
    }

    body.mode-b .fake-op .op-tool {
      color: #2ee6c0;
    }

    body.mode-b .fake-op .op-dim {
      color: #8b97a7;
    }

    body.mode-b .fake-op .op-fn {
      color: #f2f2f2;
    }

    body.mode-b .fake-op .op-res {
      color: #c4c8cf;
    }

    body.mode-b .fake-op .op-num {
      color: #ffaf5e;
    }

    body.mode-b .fake-op .op-str {
      color: #b5e890;
    }

    body.mode-b .fake-op .op-path {
      color: #6cc0ff;
    }

    body.mode-b .fake-op .op-ok {
      color: #2ee6c0;
    }

    body.mode-b .fake-op .op-warn {
      color: #ffd36b;
    }

    /* Real messages live in their own quiet panel in B mode */
    .real-feed {
      display: none;
    }

    body.mode-b .real-feed {
      display: block;
      flex-shrink: 0;
      max-height: 28vh;
      overflow-y: auto;
      padding: 4px 12px;
      border-top: 1px solid #242424;
    }

    body.mode-b .real-feed .text-line {
      font-size: 12px !important;
      line-height: 1.45 !important;
      color: #3d3d3d !important; /* Naturally muted real messages */
      cursor: pointer;
    }

    body.mode-b .real-feed .text-line.sys {
      color: #2f2f2f !important;
    }

    body.mode-b .real-feed .agent-bullet {
      color: #3d4d48 !important; /* Muted bullet, no bright accent */
    }

    body.mode-b .real-feed .text-line.revealed-original {
      color: #000000 !important;
    }

    .agent-spinner {
      display: none;
      flex-shrink: 0;
      padding: 2px 12px 6px 12px;
      font-family: inherit;
      font-size: 12px;
      color: #ff8a5c;
      align-items: center;
      gap: 10px;
    }

    body.mode-b .agent-spinner {
      display: flex;
    }

    .agent-spinner .spinner-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-spinner .spin-dim {
      color: #8b97a7;
    }

    .agent-spinner .spin-glyph {
      display: inline-block;
      width: 1ch;
      text-align: center;
    }

    .agent-clear {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 11px;
      color: #6a737d;
      background-color: transparent;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 1px 8px;
      cursor: pointer;
      user-select: none;
    }

    .agent-clear:hover {
      color: #d0d0d0;
      border-color: #4d4d4d;
    }

    .agent-clear:active {
      background-color: #2a2a2a;
    }

    body.mode-b .text-line.sys {
      color: #6a737d !important; /* Dim sub-result connector lines */
    }

    body.mode-b .btn-send {
      display: none !important; /* Hide completely in B mode */
    }

    /* Style the placeholder text */
    .chat-input::placeholder {
      color: #888888;
      opacity: 0.8;
    }

    body.mode-b .chat-input::placeholder {
      color: #6a737d !important; /* Claude Code dim input hint */
      opacity: 1 !important;
    }
  </style>
</head>

<body>

  <div class="menu-bar">
    <span class="menu-item" id="menu-file" title="Copy invite link">File</span>
    <span class="menu-item" id="menu-edit" title="Change nickname">Edit</span>
    <span class="menu-item" id="menu-view">View</span>
    <span class="menu-item" id="menu-help">Help</span>
  </div>

  <div class="text-canvas" id="viewport"></div>

  <div class="real-feed" id="real-feed"></div>

  <div class="agent-spinner" id="agent-spinner">
    <span class="spinner-text" id="spinner-text"></span>
    <button class="agent-clear" id="agent-clear" title="Clear conversation">/clear</button>
  </div>

  <div class="input-area" id="input-area-container">
    <span class="prompt-symbol">&gt;</span>
    <input type="text" id="message-input" class="chat-input" placeholder="Type a message here..." maxlength="500" autocomplete="off" spellcheck="false">
    <button class="btn-send" id="btn-send">Send</button>
  </div>

  <div class="status-bar">
    <span class="status-left" id="status-left">Ln 1, Col 1 | UTF-8 | Windows (CRLF)</span>
    <span class="status-right">
      Mode:
      <span class="mode-toggle active" id="mode-a">A</span>
      |
      <span class="mode-toggle" id="mode-b">B</span>
    </span>
  </div>

  <script>
    const MQTT_BROKER = "wss://broker.hivemq.com:8884/mqtt";

    const session = {
      clientId: "usr_" + Math.random().toString(36).substring(2, 11),
      nickname: localStorage.getItem("lingochat_user_nick") || "User_" + Math.random().toString(36).substring(2, 6),
      activeMode: localStorage.getItem("lingochat_mode") || "A",
      roomId: "",
      mqttClient: null,
      members: {},
      heartbeatInterval: null,
      pruneInterval: null,
      connectionLabel: "Connecting"
    };

    const dom = {
      menuFile: document.getElementById("menu-file"),
      menuEdit: document.getElementById("menu-edit"),
      menuView: document.getElementById("menu-view"),
      viewport: document.getElementById("viewport"),
      realFeed: document.getElementById("real-feed"),
      messageInput: document.getElementById("message-input"),
      inputAreaContainer: document.getElementById("input-area-container"),
      agentSpinner: document.getElementById("agent-spinner"),
      spinnerText: document.getElementById("spinner-text"),
      agentClear: document.getElementById("agent-clear"),
      btnSend: document.getElementById("btn-send"),
      statusLeft: document.getElementById("status-left"),
      modeA: document.getElementById("mode-a"),
      modeB: document.getElementById("mode-b")
    };

    function romanizeKorean(text) {
      const INITIALS = ['g', 'kk', 'n', 'd', 'tt', 'r', 'm', 'b', 'pp', 's', 'ss', '', 'j', 'jj', 'ch', 'k', 't', 'p', 'h'];
      const MEDIALS = ['a', 'ae', 'ya', 'yae', 'eo', 'e', 'yeo', 'ye', 'o', 'wa', 'wae', 'oe', 'yo', 'u', 'wo', 'we', 'wi', 'yu', 'eu', 'ui', 'i'];
      const STANDARD_FINALS = {
        1: 'k', 2: 'k', 3: 'k', 4: 'n', 5: 'n', 6: 'n', 7: 't', 8: 'l', 9: 'k', 10: 'm',
        11: 'p', 12: 'l', 13: 'l', 14: 'p', 15: 'l', 16: 'm', 17: 'p', 18: 'p', 19: 't',
        20: 't', 21: 'ng', 22: 't', 23: 't', 24: 'k', 25: 't', 26: 'p', 27: 't'
      };
      const LIAISONS = {
        1: 'g', 2: 'g', 3: 'gs', 4: 'n', 5: 'nj', 6: 'n', 7: 'd', 8: 'r', 9: 'lg', 10: 'lm',
        11: 'lb', 12: 'ls', 13: 'lt', 14: 'lp', 15: 'l', 16: 'm', 17: 'b', 18: 'ps', 19: 's',
        20: 'ss', 21: 'ng', 22: 'j', 23: 'ch', 24: 'k', 25: 't', 26: 'p', 27: 't'
      };

      let result = "";
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const code = char.charCodeAt(0);

        if (code >= 0xAC00 && code <= 0xD7A3) {
          const offset = code - 0xAC00;
          const initialIdx = Math.floor(offset / 588);
          const medialIdx = Math.floor((offset % 588) / 28);
          const finalIdx = offset % 28;
          const initial = INITIALS[initialIdx];
          const medial = MEDIALS[medialIdx];
          let final = "";

          if (finalIdx > 0) {
            const nextChar = text[i + 1];
            const nextCode = nextChar ? nextChar.charCodeAt(0) : 0;
            let followedByVowel = false;

            if (nextCode >= 0xAC00 && nextCode <= 0xD7A3) {
              const nextOffset = nextCode - 0xAC00;
              const nextInitialIdx = Math.floor(nextOffset / 588);
              if (nextInitialIdx === 11) followedByVowel = true;
            }

            final = followedByVowel ? (LIAISONS[finalIdx] || "") : (STANDARD_FINALS[finalIdx] || "");
          }

          result += initial + medial + final;
        } else {
          result += char;
        }
      }
      return result;
    }

    function escapeHTML(str) {
      if (!str) return "";
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function displayTextForMode(text) {
      if (session.activeMode === "B") {
        // System "; ..." notices become Claude Code sub-result connectors
        const connected = text.replace(/^;\s?/, "\u23bf  ");
        return romanizeKorean(connected);
      }
      return text;
    }

    function formatMessageLine(sender, text, timestamp) {
      const timeStr = formatTime(timestamp);
      const body = displayTextForMode(text);
      if (session.activeMode === "B") {
        // Disguise messages as Claude Code agent action lines
        return `<span class="agent-bullet">\u23fa</span>  ${escapeHTML(body)}`;
      }
      return `[${timeStr}] <${escapeHTML(sender)}> ${escapeHTML(body)}`;
    }

    function formatMessageLineRaw(sender, text, timestamp) {
      const timeStr = formatTime(timestamp);
      return `[${timeStr}] <${escapeHTML(sender)}> ${escapeHTML(text)}`;
    }

    function applyModeToBody() {
      document.body.classList.toggle("mode-b", session.activeMode === "B");
      dom.modeA.classList.toggle("active", session.activeMode === "A");
      dom.modeB.classList.toggle("active", session.activeMode === "B");
      dom.messageInput.placeholder = session.activeMode === "B" ? "Try \"how do I...\"" : "Type a message here...";
      localStorage.setItem("lingochat_mode", session.activeMode);
      updateViewMenu();
      updateStatusBar();
    }

    function refreshAllLines() {
      // Drop any fake-op clutter from the main stage
      dom.viewport.querySelectorAll(".fake-op").forEach((n) => n.remove());

      const target = realContainer();
      // Collect real lines from both containers (order preserved)
      const realLines = [
        ...dom.viewport.querySelectorAll('.text-line[data-real="1"]'),
        ...dom.realFeed.querySelectorAll('.text-line[data-real="1"]')
      ];

      realLines.forEach((line) => {
        line.dataset.showingOriginal = "0"; // Reset toggle state
        line.classList.remove("revealed-original");
        if (line.dataset.isSystem === "1") {
          line.textContent = displayTextForMode(line.dataset.text);
        } else {
          line.innerHTML = formatMessageLine(
            line.dataset.sender,
            line.dataset.text,
            Number(line.dataset.timestamp)
          );
        }
        // Relocate into the mode-appropriate container
        if (line.parentNode !== target) {
          target.appendChild(line);
        }
      });
    }

    function setMode(mode) {
      if (session.activeMode === mode) return;
      session.activeMode = mode;
      applyModeToBody();
      refreshAllLines();
      updateFakeAgentActivity();
    }

    /* ---- Fake agent activity (B mode camouflage) ---- */
    const FILES = ["index.ts", "router.go", "main.py", "config.json", "utils.rs", "app.tsx", "db.sql", "server.js", "hooks.ts", "schema.prisma", "auth.service.ts", "cache.go", "worker.py", "models/user.rb", "lib/parser.c"];
    const DIRS = ["src", "lib", "pkg", "internal", "app/api", "core", "services", "components"];
    const VERBSEARCH = ["null pointer", "race condition", "auth middleware", "retry policy", "memory leak", "deadlock", "N+1 query", "stale cache"];
    const SYMBOLS = ["handleRequest", "parseToken", "UserRepository", "connectPool", "encodePayload", "retryWithBackoff", "validateSchema", "flushBuffer"];
    function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
    function rint(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }
    function hexId(n) { let s = ""; while (s.length < n) s += Math.floor(Math.random() * 16).toString(16); return s; }
    function path() { return `${pick(DIRS)}/${pick(FILES)}`; }

    function num(v) { return `<span class="op-num">${v}</span>`; }
    function str(v) { return `<span class="op-str">${v}</span>`; }
    function pth(v) { return `<span class="op-path">${v}</span>`; }

    const FAKE = {
      spinnerTimer: null,
      opTimer: null,
      frame: 0,
      elapsed: 0,
      tokens: 0,
      glyphs: ["\u273b", "\u2733", "\u002a", "\u2736", "\u2738", "\u2739"],
      verbs: ["Compiling", "Analyzing", "Thinking", "Synthesizing", "Resolving", "Indexing", "Pondering", "Reticulating", "Crunching", "Inferring", "Distilling", "Computing", "Optimizing", "Streaming", "Embedding"],
      tools: [
        () => `Read(${pth(path())}, ${num(rint(1, 80))}:${num(rint(81, 400))})`,
        () => `Grep(${str('"' + pick(VERBSEARCH) + '"')}, glob=${str("**/*." + pick(["ts", "go", "py", "rs"]))})`,
        () => `Bash(${str(pick(["npm run build", "go test ./...", "pytest -q", "cargo check", "git diff --stat"]))})`,
        () => `Edit(${pth(path())}, ${num("+" + rint(1, 40))} ${num("-" + rint(0, 20))})`,
        () => `Search(${str('"' + pick(SYMBOLS) + '"')})`,
        () => `Fetch(${pth("https://api.local/v2/" + pick(["users", "index", "graph", "blobs"]))})`,
        () => `Write(${pth(path())}, ${num(rint(2, 18))} hunks)`,
        () => `Task(${str(pick(["explore", "refactor", "trace", "verify"]))} \u00b7 ${num(rint(2, 9))} steps)`,
        () => `Embed(${num(rint(12, 240))} chunks \u00b7 ${num(hexId(7))})`
      ],
      results: [
        () => `Read ${num(rint(40, 320))} lines`,
        () => `Found ${num(rint(1, 14))} matches in ${num(rint(2, 30))} files`,
        () => `Updated ${num(rint(1, 6))} files`,
        () => `<span class="op-ok">\u2713</span> 0 errors, ${num(rint(0, 3))} warnings`,
        () => `Done in ${num((Math.random() * 3 + 0.2).toFixed(2))}s`,
        () => `Cached \u00b7 ${num(hexId(8))}`,
        () => `Streamed ${num(rint(120, 4096))} tokens`,
        () => `<span class="op-ok">\u2713</span> Compiled \u00b7 ${num(rint(8, 220))}ms`,
        () => `Patch applied \u00b7 ${pth(path())}`,
        () => `<span class="op-warn">\u26a0</span> ${num(rint(1, 4))} TODO left`,
        () => `Vector store \u00b7 ${num(rint(1, 64))}MB`
      ]
    };

    function renderSpinner() {
      const g = FAKE.glyphs[Math.floor(FAKE.frame / 3) % FAKE.glyphs.length];
      const verb = FAKE.verbs[Math.floor(FAKE.frame / 25) % FAKE.verbs.length];
      const secs = (FAKE.elapsed / 10).toFixed(1);
      dom.spinnerText.innerHTML = `<span class="spin-glyph">${g}</span> ${verb}\u2026 <span class="spin-dim">(esc to interrupt \u00b7 ${secs}s \u00b7 \u2191 ${FAKE.tokens.toLocaleString()} tokens)</span>`;
    }

    function injectFakeOp() {
      const callDiv = document.createElement("div");
      callDiv.className = "text-line fake-op";
      callDiv.dataset.isFake = "1";
      callDiv.innerHTML = `<span class="op-tool">\u23fa</span> <span class="op-fn">${pick(FAKE.tools)()}</span>`;
      dom.viewport.appendChild(callDiv);

      // 1-2 sub-result lines per call
      const resultCount = rint(1, 2);
      for (let r = 0; r < resultCount; r++) {
        const resDiv = document.createElement("div");
        resDiv.className = "text-line fake-op";
        resDiv.dataset.isFake = "1";
        resDiv.innerHTML = `  <span class="op-dim">\u23bf</span>  <span class="op-res">${pick(FAKE.results)()}</span>`;
        dom.viewport.appendChild(resDiv);
      }
      scrollToBottom();

      // Rolling buffer of fake clutter
      const fakes = dom.viewport.querySelectorAll(".fake-op");
      if (fakes.length > 110) {
        const excess = fakes.length - 110;
        for (let i = 0; i < excess; i++) if (fakes[i]) fakes[i].remove();
      }
    }

    function injectFakeBurst() {
      const burst = rint(1, 2);
      for (let i = 0; i < burst; i++) injectFakeOp();
    }

    function updateFakeAgentActivity() {
      clearInterval(FAKE.spinnerTimer);
      clearInterval(FAKE.opTimer);
      if (session.activeMode !== "B") {
        dom.spinnerText.innerHTML = "";
        return;
      }
      FAKE.spinnerTimer = setInterval(() => {
        FAKE.frame++;
        FAKE.elapsed++;
        FAKE.tokens += Math.floor(Math.random() * 80) + 5;
        renderSpinner();
        if (FAKE.frame % 20 === 0) updateStatusBar();
      }, 100);
      FAKE.opTimer = setInterval(() => {
        injectFakeBurst();
      }, 1100);
      // Seed a modest initial wall of activity
      for (let i = 0; i < 4; i++) injectFakeOp();
      renderSpinner();
    }

    function updateStatusBar() {
      const val = dom.messageInput.value;
      const lines = val.split("\n");
      const ln = lines.length;
      const col = (lines[lines.length - 1] || "").length + 1;

      // Compact user list
      const users = [session.nickname + " (Me)"];
      for (const id in session.members) {
        users.push(session.members[id].nickname);
      }
      const count = users.length;
      let usersStr = `${count} [${users.slice(0, 3).join(", ")}]`;
      if (count > 3) {
        usersStr = `${count} [${users.slice(0, 2).join(", ")}, +${count - 2}]`;
      }

      if (session.activeMode === "B") {
        const ctx = 23 + (FAKE.tokens % 60);
        dom.statusLeft.textContent = `claude-sonnet-4.6 \u00b7 main* \u00b7 ${ctx}% context \u00b7 ~/proj`;
        return;
      }

      dom.statusLeft.textContent = `Ln ${ln}, Col ${col} | Users: ${usersStr} | UTF-8`;
    }

    function updateViewMenu() {
      if (session.activeMode === "B") {
        dom.menuView.textContent = "claude --resume";
        return;
      }
      dom.menuView.textContent = "View: " + session.connectionLabel;
    }

    function setConnectionLabel(label) {
      session.connectionLabel = label;
      updateViewMenu();
    }

    function scrollToBottom() {
      dom.viewport.scrollTop = dom.viewport.scrollHeight;
      if (session.activeMode === "B") {
        dom.realFeed.scrollTop = dom.realFeed.scrollHeight;
      }
    }

    function realContainer() {
      return session.activeMode === "B" ? dom.realFeed : dom.viewport;
    }

    function appendSystemNotice(text) {
      const div = document.createElement("div");
      div.className = "text-line sys";
      div.dataset.isSystem = "1";
      div.dataset.real = "1";
      div.dataset.text = text;
      div.textContent = displayTextForMode(text);
      realContainer().appendChild(div);
      scrollToBottom();
    }

    function renderMessageBubble(msg) {
      const lineNode = document.createElement("div");
      lineNode.className = "text-line";
      lineNode.id = "msg-node-" + msg.id;
      lineNode.dataset.msgId = msg.id;
      lineNode.dataset.real = "1";
      lineNode.dataset.text = msg.text;
      lineNode.dataset.sender = msg.senderName;
      lineNode.dataset.timestamp = msg.timestamp;
      lineNode.dataset.showingOriginal = "0";
      
      lineNode.innerHTML = formatMessageLine(msg.senderName, msg.text, msg.timestamp);
      
      // Click a line in B Mode to toggle showing its original content
      lineNode.addEventListener("click", () => {
        if (session.activeMode !== "B") return;
        
        const isShowingOriginal = lineNode.dataset.showingOriginal === "1";
        if (isShowingOriginal) {
          lineNode.innerHTML = formatMessageLine(lineNode.dataset.sender, lineNode.dataset.text, Number(lineNode.dataset.timestamp));
          lineNode.dataset.showingOriginal = "0";
          lineNode.classList.remove("revealed-original");
        } else {
          lineNode.innerHTML = formatMessageLineRaw(lineNode.dataset.sender, lineNode.dataset.text, Number(lineNode.dataset.timestamp));
          lineNode.dataset.showingOriginal = "1";
          lineNode.classList.add("revealed-original");
        }
      });
      
      realContainer().appendChild(lineNode);
      scrollToBottom();
    }

    dom.menuFile.addEventListener("click", () => {
      navigator.clipboard.writeText(window.location.href).catch(() => {});
    });

    dom.inputAreaContainer.addEventListener("click", () => {
      dom.messageInput.focus();
    });

    dom.btnSend.addEventListener("click", (e) => {
      e.stopPropagation();
      submitMessage();
    });

    function clearHistory() {
      // Wipe all rendered lines: fake ops in the viewport AND real messages
      dom.viewport.innerHTML = "";
      dom.realFeed.innerHTML = "";
      // Reset fake agent counters so it looks like a fresh session
      FAKE.frame = 0;
      FAKE.elapsed = 0;
      FAKE.tokens = 0;
      if (session.activeMode === "B") {
        renderSpinner();
        updateStatusBar();
        // Immediately rebuild a fresh wall of fake activity
        for (let i = 0; i < 4; i++) injectFakeOp();
      }
    }

    dom.agentClear.addEventListener("click", (e) => {
      e.stopPropagation();
      clearHistory();
      dom.messageInput.focus();
    });

    dom.menuEdit.addEventListener("click", () => {
      const next = prompt("Nickname:", session.nickname);
      if (next === null) return;
      const cleanVal = next.trim() || session.nickname;
      session.nickname = cleanVal;
      localStorage.setItem("lingochat_user_nick", cleanVal);
      publishHeartbeat();
      updateStatusBar();
    });

    dom.modeA.addEventListener("click", () => setMode("A"));
    dom.modeB.addEventListener("click", () => setMode("B"));

    dom.messageInput.addEventListener("input", updateStatusBar);
    dom.messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitMessage();
      }
      updateStatusBar();
    });

    // Handle Visual Viewport for mobile virtual keyboards to prevent cutting out the UI on top
    if (window.visualViewport) {
      const handleResize = () => {
        document.body.style.height = window.visualViewport.height + "px";
        scrollToBottom();
      };
      window.visualViewport.addEventListener("resize", handleResize);
      window.visualViewport.addEventListener("scroll", handleResize);
      window.addEventListener("load", handleResize);
    }

    // Prevent accidental browser elastic panning/bouncing on mobile
    window.addEventListener("scroll", () => {
      window.scrollTo(0, 0);
    });

    applyModeToBody();
    updateStatusBar();
    updateViewMenu();
    updateFakeAgentActivity();

    window.addEventListener("load", () => {
      const params = new URLSearchParams(window.location.search);
      let room = params.get("room");

      if (!room) {
        room = "room-" + Math.random().toString(36).substring(2, 7) + "-" + Math.random().toString(36).substring(2, 7);
        window.history.replaceState({}, "", "?room=" + encodeURIComponent(room));
      }

      session.roomId = room;
      session.members = {};
      dom.viewport.innerHTML = "";
      dom.realFeed.innerHTML = "";
      appendSystemNotice("; session " + room);
      connectRelay();
    });

    function connectRelay() {
      setConnectionLabel("Connecting");

      const connOpts = {
        clientId: "lgc_client_" + Math.random().toString(36).substring(2, 10),
        clean: true,
        connectTimeout: 8000,
        reconnectPeriod: 4000
      };

      try {
        session.mqttClient = mqtt.connect(MQTT_BROKER, connOpts);

        session.mqttClient.on("connect", () => {
          setConnectionLabel("Connected");

          const msgTopic = "lingochat/" + session.roomId + "/msg";
          const presenceTopic = "lingochat/" + session.roomId + "/presence/+";

          session.mqttClient.subscribe([msgTopic, presenceTopic], (err) => {
            if (err) {
              appendSystemNotice("; error " + err.message);
            } else {
              publishHeartbeat();
              startPresenceTimers();
            }
          });
        });

        session.mqttClient.on("message", (topic, payload) => {
          try {
            const data = JSON.parse(payload.toString());
            handleNetworkEvent(topic, data);
          } catch (err) {
            console.error("Payload error:", err);
          }
        });

        session.mqttClient.on("close", () => {
          setConnectionLabel("Disconnected");
        });

        session.mqttClient.on("reconnect", () => {
          setConnectionLabel("Connecting");
        });
      } catch (err) {
        appendSystemNotice("; error " + err.message);
      }
    }

    function handleNetworkEvent(topic, data) {
      const msgTopic = "lingochat/" + session.roomId + "/msg";
      const presencePrefix = "lingochat/" + session.roomId + "/presence/";

      if (topic === msgTopic) {
        renderMessageBubble(data);
      } else if (topic.startsWith(presencePrefix)) {
        const remoteClientId = topic.replace(presencePrefix, "");
        if (remoteClientId === session.clientId) return;

        if (data.leaving) {
          if (session.members[remoteClientId]) {
            const oldNick = session.members[remoteClientId].nickname;
            appendSystemNotice("; " + oldNick + " left");
            delete session.members[remoteClientId];
            updateStatusBar();
          }
        } else {
          const existed = !!session.members[remoteClientId];
          const oldNick = existed ? session.members[remoteClientId].nickname : "";

          session.members[remoteClientId] = {
            nickname: data.nickname,
            lastSeen: Date.now()
          };

          if (!existed) {
            appendSystemNotice("; " + data.nickname + " joined");
            updateStatusBar();
          } else if (oldNick !== data.nickname) {
            appendSystemNotice("; " + oldNick + " renamed to " + data.nickname);
            updateStatusBar();
          }
        }
      }
    }

    function startPresenceTimers() {
      clearInterval(session.heartbeatInterval);
      clearInterval(session.pruneInterval);
      session.heartbeatInterval = setInterval(publishHeartbeat, 5000);
      session.pruneInterval = setInterval(() => {
        const threshold = Date.now() - 12000;
        let changed = false;
        for (const id in session.members) {
          if (session.members[id].lastSeen < threshold) {
            const prunedNick = session.members[id].nickname;
            appendSystemNotice("; " + prunedNick + " timed out");
            delete session.members[id];
            changed = true;
          }
        }
        if (changed) {
          updateStatusBar();
        }
      }, 3000);
    }

    function publishHeartbeat(isLeaving = false) {
      if (!session.mqttClient || !session.mqttClient.connected) return;

      const presenceTopic = "lingochat/" + session.roomId + "/presence/" + session.clientId;
      session.mqttClient.publish(presenceTopic, JSON.stringify({
        nickname: session.nickname,
        leaving: isLeaving,
        timestamp: Date.now()
      }), { qos: 0, retain: false });
    }

    function submitMessage() {
      if (!session.mqttClient || !session.mqttClient.connected) {
        appendSystemNotice("; offline");
        return;
      }

      const txt = dom.messageInput.value.trim();
      if (!txt) return;

      const packet = {
        id: "msg_" + Date.now() + "_" + Math.random().toString(36).substring(2, 6),
        senderId: session.clientId,
        senderName: session.nickname,
        text: txt,
        timestamp: Date.now()
      };

      session.mqttClient.publish(
        "lingochat/" + session.roomId + "/msg",
        JSON.stringify(packet),
        { qos: 1 }
      );

      dom.messageInput.value = "";
      updateStatusBar();
      dom.messageInput.focus();
    }

    window.addEventListener("beforeunload", () => {
      publishHeartbeat(true);
    });
  </script>
</body>

</html>
